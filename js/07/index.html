<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Query Selector</title>
</head>
<body>
    <nav class="block">
        <p class="paragraph"> Welcome to my Website </p>
    </nav>

    <div>
        <h4>Hey There, My name is <span style="color: blue;" id="username">Shreya Thakkar</span> :) </h4>
        <p >Here is a code for you</p>
        <pre><code>console.log('Hey There!')</code></pre>
    </div>
    <div id="my-container"></div>

    <button id="clickbutton">Click Me</button>

    

    <script>
        const button = document.getElementById('clickbutton');
        const container = document.getElementById('my-container');

        let count = 1;

        button.addEventListener('click', () => {
            const el = document.createElement('li');
            //const el = document.createElement('h1');
            //el.innerText = 'Shreyaaa Thakkar'
            //container.appendChild(el);
            el.innerText = count;
            container.appendChild(el);
            count++;
        });


    </script>

</body>
</html>
